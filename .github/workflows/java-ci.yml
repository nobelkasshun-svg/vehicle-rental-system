name: Java CI Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: Build and Check Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Java code
        run: |
          cd src
          javac rental/*.java
          echo "✅ Compilation successful!"

      - name: Check all required files exist
        run: |
          echo "Checking required files..."
          test -f src/rental/Vehicle.java && echo "✅ Vehicle.java found" || echo "❌ Vehicle.java missing"
          test -f src/rental/Car.java && echo "✅ Car.java found" || echo "❌ Car.java missing"
          test -f src/rental/Motorcycle.java && echo "✅ Motorcycle.java found" || echo "❌ Motorcycle.java missing"
          test -f src/rental/Customer.java && echo "✅ Customer.java found" || echo "❌ Customer.java missing"
          test -f src/rental/RentalManager.java && echo "✅ RentalManager.java found" || echo "❌ RentalManager.java missing"
          test -f src/rental/Main.java && echo "✅ Main.java found" || echo "❌ Main.java missing"
          test -f README.md && echo "✅ README.md found" || echo "❌ README.md missing"

      - name: Run the program
        run: |
          cd src
          javac rental/*.java
          java rental.Main
          echo "✅ Program ran successfully!"

      - name: Check OOP concepts in code
        run: |
          echo "Checking OOP concepts..."
          grep -r "private" src/rental/Vehicle.java && echo "✅ Encapsulation found" || echo "❌ Encapsulation missing"
          grep -r "extends" src/rental/Car.java && echo "✅ Inheritance found in Car" || echo "❌ Inheritance missing"
          grep -r "extends" src/rental/Motorcycle.java && echo "✅ Inheritance found in Motorcycle" || echo "❌ Inheritance missing"
          grep -r "@Override" src/rental/Car.java && echo "✅ Polymorphism found" || echo "❌ Polymorphism missing"
          grep -r "abstract" src/rental/Vehicle.java && echo "✅ Abstraction found" || echo "❌ Abstraction missing"
          echo "✅ All OOP checks complete!"

      - name: Check naming conventions
        run: |
          echo "Checking Java naming conventions..."
          grep -r "class Vehicle" src/rental/Vehicle.java && echo "✅ Vehicle class naming correct" || echo "❌ Check Vehicle naming"
          grep -r "class Car" src/rental/Car.java && echo "✅ Car class naming correct" || echo "❌ Check Car naming"
          grep -r "class Customer" src/rental/Customer.java && echo "✅ Customer class naming correct" || echo "❌ Check Customer naming"
          echo "✅ Naming convention checks complete!"